<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA — Inscription</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md px-8 py-10 bg-gray-900 rounded-2xl shadow-2xl">

        <!-- Logo -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white tracking-widest">NOVA</h1>
            <p class="text-gray-400 mt-2 text-sm">La sécurisé notre priorité</p>
        </div>

        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-4 px-4 py-3 rounded-lg text-sm
                        {% if category == 'error' %} bg-red-500/20 text-red-400 border border-red-500/30
                        {% else %} bg-green-500/20 text-green-400 border border-green-500/30 {% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Formulaire -->
        <form method="POST" action="/register" class="space-y-5">

            <div>
                <label class="block text-gray-400 text-sm mb-1">Nom d'utilisateur</label>
                <input type="text" name="username" placeholder="daniel"
                    class="w-full bg-gray-800 text-white rounded-lg px-4 py-3 text-sm border border-gray-700 focus:outline-none focus:border-indigo-500 transition">
            </div>

            <div>
                <label class="block text-gray-400 text-sm mb-1">Email</label>
                <input type="email" name="email" placeholder="daniel@email.com"
                    class="w-full bg-gray-800 text-white rounded-lg px-4 py-3 text-sm border border-gray-700 focus:outline-none focus:border-indigo-500 transition">
            </div>

            <div>
                <label class="block text-gray-400 text-sm mb-1">Mot de passe</label>
                <input type="password" name="password" placeholder="••••••••"
                    class="w-full bg-gray-800 text-white rounded-lg px-4 py-3 text-sm border border-gray-700 focus:outline-none focus:border-indigo-500 transition">
            </div>

            <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 rounded-lg transition text-sm">
                Créer mon compte
            </button>

        </form>

        <p class="text-center text-gray-500 text-sm mt-6">
            Déjà un compte ?
            <a href="/login" class="text-indigo-400 hover:text-indigo-300 transition">Se connecter</a>
        </p>

    </div>

</body>
</html>
